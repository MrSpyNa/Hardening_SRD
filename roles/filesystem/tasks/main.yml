---
# CIS 1.1 — Filesystems, módulos y protocolos deshabilitados

- name: Deshabilitar filesystems y protocolos innecesarios (CIS 1.1.1 / NETW-3200)
  ansible.builtin.copy:
    dest: /etc/modprobe.d/cis-disable.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Filesystems innecesarios — CIS 1.1.1
      install cramfs /bin/true
      install freevxfs /bin/true
      install jffs2 /bin/true
      install hfs /bin/true
      install hfsplus /bin/true
      install squashfs /bin/true
      install udf /bin/true

      # Protocolos de red innecesarios — CIS 3.4 / NETW-3200
      install dccp /bin/true
      install sctp /bin/true
      install rds /bin/true
      install tipc /bin/true

      # Storage externo — USB-1000 / STRG-1846
      install usb-storage /bin/true
      install firewire-ohci /bin/true

      # IPv6 a nivel de módulo
      install ipv6 /bin/true

- name: Configurar /tmp con opciones seguras (CIS 1.1.2)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^tmpfs\s+/tmp\s+'
    line: 'tmpfs   /tmp   tmpfs   defaults,noexec,nosuid,nodev   0 0'
    state: present

- name: Configurar /var/tmp con opciones seguras (CIS 1.1.3)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^tmpfs\s+/var/tmp\s+'
    line: 'tmpfs   /var/tmp   tmpfs   defaults,noexec,nosuid,nodev   0 0'
    state: present

- name: Configurar /dev/shm con opciones seguras (CIS 1.1.4)
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^tmpfs\s+/dev/shm\s+'
    line: 'tmpfs   /dev/shm   tmpfs   defaults,noexec,nosuid,nodev   0 0'
    state: present

- name: Remontar /tmp
  ansible.builtin.command: mount -o remount /tmp
  changed_when: false
  failed_when: false

- name: Remontar /dev/shm
  ansible.builtin.command: mount -o remount /dev/shm
  changed_when: false
  failed_when: false
